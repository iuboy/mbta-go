version: "2"
linters:
  enable:
    - errname
    - exhaustive
    - gocognit
    - goconst
    - gocritic
    - godox
    - gosec
    - maintidx
    - misspell
    - nilerr
    - noctx
    - prealloc
    - predeclared
    - revive
    - sloglint
    - unconvert
    - whitespace
  settings:
    exhaustive:
      default-signifies-exhaustive: true
    gocognit:
      min-complexity: 30
    gocritic:
      enabled-checks:
        - hugeParam
        - rangeExprCopy
        - rangeValCopy
    revive:
      rules:
        - name: exported
        - name: unhandled-error
    sloglint:
      no-mixed-args: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - staticcheck
        path: _test\.go
        text: SA5011
      - linters:
          - gosec
        text: G115
      - linters:
          - gosec
        path: (examples|v1/transport\.go|ntls/transport\.go|_test\.go)
        text: G402
      - linters:
          - gosec
        text: G104
      - linters:
          - gosec
        text: G304
      - linters:
          - gosec
        path: _test\.go
        text: G404
      - linters:
          - goconst
          - gocognit
          - gocritic
          - maintidx
          - revive
        path: _test\.go
      - linters:
          - errcheck
          - revive
        path: examples/
      - linters:
          - gocritic
        text: hugeParam
      - linters:
          - goconst
        path: core/capability\.go
    paths:
      - third_party$
      - builtin$
      - ^examples/
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - ^examples/
