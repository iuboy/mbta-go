version: "2"
linters:
  enable:
    - errname
    - exhaustive
    - gocognit
    - goconst
    - gocritic
    - godox
    - gosec
    - maintidx
    - misspell
    - nilerr
    - noctx
    - prealloc
    - predeclared
    - revive
    - sloglint
    - unconvert
    - whitespace
  settings:
    exhaustive:
      default-signifies-exhaustive: true
    gocognit:
      min-complexity: 30
    gocritic:
      enabled-checks:
        - rangeExprCopy
        - rangeValCopy
    revive:
      rules:
        - name: exported
        - name: unhandled-error
    sloglint:
      no-mixed-args: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - staticcheck
        path: _test\.go
        text: SA5011
      - linters:
          - gosec
        text: G115
      - linters:
          - gosec
        # G402（TLS 配置）：仅对测试/示例豁免，生产传输层（v1/transport.go、
        # ntls/transport.go）的 TLS 配置必须经 gosec 审计。
        path: (examples|_test\.go)
        text: G402
      - linters:
          - gosec
        # G104（未处理错误）：仅对测试/示例豁免。生产代码的未处理错误可能导致
        # 数据损坏/状态不一致，必须显式处理或用 //nolint 注释豁免。
        path: (examples|_test\.go)
        text: G104
      - linters:
          - gosec
        # G304（路径注入）：仅对测试/示例豁免。生产代码若用外部输入拼路径读取文件，
        # 会构成路径遍历/任意读安全风险。
        path: (examples|_test\.go)
        text: G304
      - linters:
          - gosec
        path: _test\.go
        text: G404
      - linters:
          - goconst
          - gocognit
          - gocritic
          - maintidx
          - revive
        path: _test\.go
      - linters:
          - errcheck
          - revive
        path: examples/
      - linters:
          - goconst
        path: core/capability\.go
    paths:
      - third_party$
      - builtin$
      - ^examples/
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - ^examples/
